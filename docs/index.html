<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
  <title>Workshop Aanmelding</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }
    .box {
      background: white;
      padding: 25px;
      margin: 50px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
    }
    input, button {
      width: 90%;
      padding: 12px;
      font-size: 16px;
      margin: 6px;
    }
    button {
      background: #FF0000;
      color: white;
      border: none;
      cursor: pointer;
    }
    .persoon {
      border-top: 1px solid #ddd;
      margin-top: 10px;
      padding-top: 10px;
    }
    .remove {
      background: #999;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Workshop Aanmelding</h2>
  <p id="status">Klik op aanmelden om je in te schrijven</p>

  <form onsubmit="sendData(event)">
    <div id="personen"></div>

    <button type="button" onclick="addPersoon()">+ Persoon toevoegen</button>
    <button type="submit" id="btn">Aanmelden</button>
  </form>

  <p id="melding"></p>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwDv_VAKusEevytSubm1azKdFETh6O0I8ROY-qFzdi_GQltpxJVGTphOjByThyysSJp/exec";

let countPersoon = 0;

// ➕ Persoon toevoegen
function addPersoon() {
  countPersoon++;

  const div = document.createElement("div");
  div.className = "persoon";
  div.id = "persoon_" + countPersoon;

  div.innerHTML = `
    <h4>Persoon ${countPersoon}</h4>
    <input placeholder="Naam" required>
    <input type="number" placeholder="Leeftijd" required>
    <input placeholder="Telefoon">
    <input type="email" placeholder="Email">
    <button type="button" class="remove" onclick="removePersoon(${countPersoon})">Verwijderen</button>
  `;

  document.getElementById("personen").appendChild(div);
}

// ❌ Persoon verwijderen
function removePersoon(id) {
  const el = document.getElementById("persoon_" + id);
  if (el) el.remove();
}

// 🚀 Verzenden (CORS FIX)
function sendData(e) {
  e.preventDefault();

  const personenDivs = document.querySelectorAll(".persoon");
  let personen = [];

  personenDivs.forEach(div => {
    const inputs = div.querySelectorAll("input");

    personen.push({
      naam: inputs[0].value,
      leeftijd: inputs[1].value,
      telefoon: inputs[2].value,
      email: inputs[3].value
    });
  });

  if (personen.length === 0) {
    alert("Voeg minstens 1 persoon toe");
    return;
  }

  // knop uitschakelen (voorkomt dubbel klikken)
  document.getElementById("btn").disabled = true;
  document.getElementById("melding").innerText = "Bezig met verzenden...";

  fetch(URL, {
    method: "POST",
    mode: "no-cors", // 🔥 BELANGRIJK
    body: JSON.stringify(personen),
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    }
  })
  .then(() => {
    document.getElementById("melding").innerText = "✅ Aanmelding gelukt!";

    document.getElementById("personen").innerHTML = "";
    countPersoon = 0;

    addPersoon();
    document.getElementById("btn").disabled = false;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("melding").innerText = "❌ Fout bij verzenden";
    document.getElementById("btn").disabled = false;
  });
}

// start met 1 persoon
addPersoon();
</script>

</body>
</html>
